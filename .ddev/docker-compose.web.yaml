services:
    web:
        environment:
            - EXTENSION_KEY=size
            - PACKAGE_NAME=t3/size

            # TYPO3 config
            - TYPO3_DB_DRIVER=mysqli
            - TYPO3_DB_USERNAME=root
            - TYPO3_DB_PASSWORD=root
            - TYPO3_DB_HOST=db
            - TYPO3_SETUP_ADMIN_EMAIL=admin@example.com
            - TYPO3_SETUP_ADMIN_USERNAME=admin
            - TYPO3_SETUP_ADMIN_PASSWORD=Password:joh316
            - TYPO3_PROJECT_NAME=EXT:size Dev Environment
            - TYPO3_SERVER_TYPE=apache
        volumes:
            - type: bind
              source: ../
              target: /var/www/size
              consistency: cached
            - v13-data:/var/www/html/v13
            - v14-data:/var/www/html/v14
            - v13-classic-data:/var/www/html/v13-classic
            - v14-classic-data:/var/www/html/v14-classic
volumes:
    v13-data:
        name: "${DDEV_SITENAME}-v13-data"
    v14-data:
        name: "${DDEV_SITENAME}-v14-data"
    v13-classic-data:
        name: "${DDEV_SITENAME}-v13-classic-data"
    v14-classic-data:
        name: "${DDEV_SITENAME}-v14-classic-data"
