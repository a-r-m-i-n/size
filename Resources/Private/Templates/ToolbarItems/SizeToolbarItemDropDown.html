<html xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers" data-namespace-typo3-fluid="true">
<f:asset.css
    identifier="size-toolbar-item-dropdown"
    href="EXT:size/Resources/Public/Css/SizeToolbarItemDropDown.css"
/>

<div class="size-storage-dropdown">
    <p class="dropdown-headline mb-2"><f:translate key="title" extensionName="size" /></p>

    <div class="dropdown-item-text">
        <div class="size-storage-section-heading">
            <span class="size-storage-section-icon size-storage-section-icon-media"><core:icon identifier="actions-file-image" alternativeMarkupIdentifier="inline" /></span>
            <strong><f:translate key="section.fileadmin" extensionName="size" />: {storages.total.label}</strong>
        </div>
    </div>

    <div class="dropdown-item-text">
        <div class="size-storage-section-heading">
            <span class="size-storage-section-icon size-storage-section-icon-database"><core:icon identifier="actions-database" alternativeMarkupIdentifier="inline" /></span>
            <strong><f:translate key="section.database" extensionName="size" />: {database.total.label}</strong>
        </div>
    </div>

    <div class="dropdown-item-text">
        <div class="size-storage-section-heading">
            <span class="size-storage-section-icon size-storage-section-icon-code"><core:icon identifier="actions-code" alternativeMarkupIdentifier="inline" /></span>
            <strong><f:translate key="section.code" extensionName="size" />: {code.total.label}</strong>
        </div>
    </div>

    <div class="dropdown-item-text">
        <div class="size-storage-section-heading">
            <span class="size-storage-section-icon size-storage-section-icon-misc"><core:icon identifier="actions-cog" alternativeMarkupIdentifier="inline" /></span>
            <strong><f:translate key="section.misc" extensionName="size" />: {misc.total.label}</strong>
        </div>
    </div>

    <hr class="dropdown-divider" aria-hidden="true">

    <div class="dropdown-item-text">
        <div class="size-storage-section-heading">
            <span class="size-storage-section-icon {total.highlightClass}"><core:icon identifier="actions-info-circle" alternativeMarkupIdentifier="inline" /></span>
            <strong class="{total.highlightClass}"><f:translate key="section.total" extensionName="size" />: {total.displayLabel}</strong>
        </div>
    </div>

    <hr class="dropdown-divider" aria-hidden="true">

    <a href="{storageStatisticsModuleUrl}" class="dropdown-item mb-1" aria-describedby="">
        <span class="dropdown-item-columns">
            <core:icon identifier="actions-arrow-end" alternativeMarkupIdentifier="inline" />
            <span class="dropdown-item-column dropdown-item-column-text">
                <f:translate key="toolbar.openStorageStatistics" extensionName="size" />
            </span>
        </span>
    </a>
</div>
</html>
